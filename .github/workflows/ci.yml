name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run ruff lint
        run: uv run ruff check

      - name: Run mypy typecheck
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest
